  <style>
    /* ── RESET ET VARIABLES ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #b8f0f0;
      --navy: #0d1b2a;
      --teal: #0a9396;
      --teal-light: #94d2bd;
      --white: #f8fffe;
      --alert: #e63946;
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--sky);
      color: var(--navy);
      overflow-x: hidden;
    }

    /* ── HERO BG DECORATION ── */
    .bg-blob {
      position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.35; pointer-events: none; z-index: 0;
    }
    .blob1 { width: 480px; height: 480px; background: var(--teal); top: -100px; left: -80px; }
    .blob2 { width: 360px; height: 360px; background: #00b4d8; bottom: 60px; right: -60px; }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0; display: flex; align-items: center;
      background: var(--navy); padding: 0 2rem; height: 52px; z-index: 100;
    }
    .nav-logo-img { height: 32px; margin-right: 12px; border-radius: 4px; object-fit: contain; }
    .nav-brand { font-family: 'Syne', sans-serif; font-weight: 700; font-size: 0.95rem; color: var(--white); letter-spacing: 0.04em; }
    .nav-links { margin-left: auto; display: flex; gap: 12px; align-items: center; }
    .nav-links a {
      font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 500; color: var(--sky);
      text-decoration: none; padding: 6px 14px; border-radius: 4px; transition: background .2s, color .2s;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .nav-links a:hover, .nav-links a.active { background: var(--teal); color: #fff; }
    .nav-bell { position: relative; font-size: 1.1rem; color: var(--sky); cursor: pointer; margin: 0 8px; }
    .nav-bell::after { content: ''; position: absolute; top: -2px; right: -2px; width: 8px; height: 8px; background: var(--alert); border-radius: 50%; border: 2px solid var(--navy); }

    /* ── LAYOUT PRINCIPAL ── */
    .page-wrapper {
      position: relative; z-index: 1; width: 100%; max-width: 900px;
      margin: 0 auto; padding: 6rem 1.5rem 5rem 1.5rem; display: flex; flex-direction: column; gap: 2rem;
    }
    .page-header {
      display: flex; align-items: center; gap: 12px; font-family: 'Syne', sans-serif; font-size: 1.8rem; font-weight: 800; color: var(--navy);
      background: rgba(255,255,255,0.55); padding: 12px 24px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.8); backdrop-filter: blur(10px); width: max-content;
    }
    .glass-panel {
      background: rgba(255,255,255,0.65); backdrop-filter: blur(14px); border: 1px solid rgba(255,255,255,0.8); border-radius: 16px; box-shadow: 0 8px 32px rgba(0,0,0,.08); padding: 2.5rem;
    }
    .form-title { font-family: 'Syne', sans-serif; font-size: 1.4rem; font-weight: 700; color: var(--navy); margin-bottom: 2rem; text-align: center; }
    .form-title::after { content: ''; display: block; width: 60px; height: 3px; background: var(--teal); margin: 10px auto 0; border-radius: 2px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full-width { grid-column: span 2; }
    .form-group label { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; color: #3d5a5a; letter-spacing: 0.05em; }
    .form-group input, .form-group select {
      padding: 12px 14px; border: 1.5px solid #cce0e0; border-radius: 10px; font-family: 'DM Sans', sans-serif; font-size: 0.95rem; color: var(--navy); outline: none; background: rgba(255,255,255,0.8); transition: border-color 0.2s;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--teal); background: #ffffff; }
    .form-group input[readonly] { background: rgba(13, 27, 42, 0.05); color: #6b8080; cursor: not-allowed; font-weight: 600; }

    .form-actions { display: flex; justify-content: flex-end; margin-top: 2.5rem; }
    .btn-submit {
      background: linear-gradient(135deg, var(--teal), #00b4d8); color: #fff; border: none; border-radius: 12px; padding: 14px 32px; font-family: 'Syne', sans-serif; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: transform .2s, box-shadow .2s;
    }
    .btn-submit:hover { transform: translateY(-3px); box-shadow: 0 10px 25px rgba(10,147,150,.3); }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .form-group.full-width { grid-column: span 1; }
    }
    footer { position: fixed; bottom: 0; left: 0; right: 0; height: 42px; background: var(--navy); display: flex; align-items: center; justify-content: center; font-family: 'DM Sans', sans-serif; font-size: 0.78rem; color: var(--teal-light); letter-spacing: 0.08em; z-index: 100; }
    .nav-logout { font-family: 'DM Sans', sans-serif; font-size: 0.78rem; font-weight: 600; color: #ffb3b8; text-decoration: none; padding: 6px 14px; border-radius: 4px; border: 1px solid rgba(230,57,70,0.4); transition: all .2s; margin-left: 4px; }
    .nav-logout:hover { background: var(--alert); color: #fff; border-color: var(--alert); }
  </style>
</head>
<body>
  <div class="bg-blob blob1"></div><div class="bg-blob blob2"></div>

  <nav>
    <img src="logo.jpg" alt="Logo" class="nav-logo-img">
    <span class="nav-brand">SmartCampus</span>
    <div class="nav-links">
      <a href="menu_admin.html">Menu</a>
      <a href="dashboard_admin.html">Tableau de bord</a>
      <a href="#" class="active">Profil : Administrateur</a>
      <a href="deconnexion.php" class="nav-logout">🚪 Déconnexion</a>


  <main class="page-wrapper">
    <div class="page-header">👨‍🏫+ Ajout enseignant</div>

    <div class="glass-panel">
      <h2 class="form-title">Remplir le formulaire</h2>
      
      <form id="addTeacherForm" onsubmit="handleFormSubmit(event)">
        <div class="form-grid">
          <div class="form-group">
            <label>ID Enseignant</label>
            <input type="text" value="Généré automatiquement" readonly>
          </div>
          <div class="form-group">
            <label>Statut / Type de contrat</label>
            <select required>
              <option value="" disabled selected>Sélectionner un statut</option>
              <option value="Titulaire">Titulaire (Permanent)</option>
              <option value="Vacataire">Vacataire</option>
              <option value="Intervenant">Intervenant Extérieur</option>
            </select>
          </div>
          <div class="form-group">
            <label>Nom</label>
            <input type="text" id="nom" placeholder="Saisir le nom" required>
          </div>
          <div class="form-group">
            <label>Prénom</label>
            <input type="text" id="prenom" placeholder="Saisir le prénom" required>
          </div>
          <div class="form-group">
            <label>Date de naissance</label>
            <input type="date" id="dateNaissance" required onchange="calculateAge()">
          </div>
          <div class="form-group">
            <label>Âge</label>
            <input type="number" id="age" placeholder="Âge calculé" required>
          </div>
          <div class="form-group">
            <label>Matière principale / Département</label>
            <input type="text" placeholder="Ex: Informatique, Web Design, Marketing" required>
          </div>
          <div class="form-group">
            <label>Dernier Diplôme / Titre académique</label>
            <input type="text" placeholder="Ex: Doctorat en Informatique, Master" required>
          </div>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-submit">✔️ Ajouter enseignant</button>
        </div>
      </form>
    </div>
  </main>

  <footer>© 2026 SmartCampus — Tous droits réservés</footer>

  <script>
    function calculateAge() {
      const birthInput = document.getElementById('dateNaissance').value;
      if (birthInput) {
        const birthDate = new Date(birthInput);
        const today = new Date();
        let age = today.getFullYear() - birthDate.getFullYear();
        const m = today.getMonth() - birthDate.getMonth();
        if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) { age--; }
        document.getElementById('age').value = age;
      }
    }
    function handleFormSubmit(event) {
      event.preventDefault();
      alert("Succès : L'enseignant(e) " + document.getElementById('prenom').value + " " + document.getElementById('nom').value + " a été ajouté(e) !\n\nRedirection...");
      window.location.href = 'menu_admin.html';
    }
  </script>
</body>
