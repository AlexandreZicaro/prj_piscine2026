<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Messagerie - SmartCampus</title>
  
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>
  
  <style>
    /* ── RESET ET VARIABLES ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --sky: #b8f0f0;
      --sky-dark: #8de0e0;
      --navy: #0d1b2a;
      --teal: #0a9396;
      --teal-light: #94d2bd;
      --white: #f8fffe;
      --alert: #e63946;
    }

    html, body {
      min-height: 100vh;
      font-family: 'DM Sans', sans-serif;
      background: var(--sky);
      color: var(--navy);
      overflow-x: hidden;
    }

    /* ── HERO BG DECORATION (Bulles de fond) ── */
    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }
    .blob1 { width: 480px; height: 480px; background: var(--teal); top: -100px; left: -80px; }
    .blob2 { width: 360px; height: 360px; background: #00b4d8; bottom: 60px; right: -60px; }

    /* ── NAVBAR ── */
    nav {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center;
      background: var(--navy);
      padding: 0 2rem;
      height: 52px;
      z-index: 100;
    }
    .nav-logo-img {
      height: 32px;
      margin-right: 12px;
      border-radius: 4px;
      object-fit: contain;
    }
    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--white);
      letter-spacing: 0.04em;
    }
    .nav-links {
      margin-left: auto;
      display: flex; gap: 12px; align-items: center;
    }
    .nav-links a {
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--sky);
      text-decoration: none;
      padding: 6px 14px;
      border-radius: 4px;
      transition: background .2s, color .2s;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .nav-links a:hover { background: var(--teal); color: #fff; }
    .nav-links a.active { background: var(--teal); color: #fff; }

    /* Cloche de notifications */
    .nav-bell {
      position: relative;
      font-size: 1.1rem;
      color: var(--sky);
      cursor: pointer;
      margin: 0 8px;
      transition: transform 0.2s, color 0.2s;
    }
    .nav-bell:hover { transform: scale(1.1); color: #fff; }
    .nav-bell::after {
      content: ''; position: absolute;
      top: -2px; right: -2px;
      width: 8px; height: 8px;
      background: var(--alert);
      border-radius: 50%;
      border: 2px solid var(--navy);
    }

    /* ── LAYOUT PRINCIPAL (MESSAGERIE) ── */
    .page-wrapper {
      position: relative;
      z-index: 1;
      width: 100%; 
      max-width: 1200px;
      margin: 0 auto; 
      padding: 6rem 1.5rem 5rem 1.5rem;
      display: flex;
      flex-direction: column;
    }

    /* CONTENEUR PRINCIPAL GLASSMORPHISM */
    .messagerie-container {
      background: rgba(255,255,255,0.65);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.8);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,.08);
      display: flex;
      flex-direction: column;
      overflow: hidden; /* Pour garder les coins arrondis */
    }

    /* HEADER "messagerie" */
    .messagerie-header {
      padding: 20px 30px;
      border-bottom: 2px solid rgba(13, 27, 42, 0.08);
    }
    .messagerie-header h1 {
      font-family: 'Syne', sans-serif;
      font-size: 1.8rem;
      font-weight: 800;
      color: var(--navy);
      text-transform: capitalize;
    }

    /* CORPS DE LA MESSAGERIE (2 Colonnes) */
    .messagerie-body {
      display: flex;
      min-height: 550px;
    }

    /* COLONNE GAUCHE (Dossiers) */
    .messagerie-sidebar {
      width: 280px;
      border-right: 2px solid rgba(13, 27, 42, 0.08);
      background: rgba(255,255,255,0.3);
      padding: 20px 0;
    }
    .sidebar-menu {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .sidebar-menu li {
      padding: 14px 30px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--navy);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background 0.2s, color 0.2s;
    }
    .sidebar-menu li:hover {
      background: rgba(10, 147, 150, 0.1);
      color: var(--teal);
    }
    /* Elément sélectionné dans le sous-menu */
    .sidebar-menu li.active {
      background: rgba(10, 147, 150, 0.15);
      border-left: 4px solid var(--teal);
      color: var(--teal);
    }
    .badge {
      font-size: 0.75rem;
      font-weight: 700;
      background: var(--teal);
      color: var(--white);
      padding: 3px 8px;
      border-radius: 12px;
      text-transform: uppercase;
    }

    /* COLONNE DROITE (Formulaire) */
    .messagerie-content {
      flex: 1;
      padding: 30px 40px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    /* Champs de texte (Inputs & Textarea) */
    .input-group {
      display: flex;
      flex-direction: column;
    }
    .msg-input, .msg-textarea {
      width: 100%;
      background: rgba(255,255,255,0.8);
      border: 1.5px solid #cce0e0;
      border-radius: 10px;
      padding: 14px;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      color: var(--navy);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .msg-input::placeholder, .msg-textarea::placeholder {
      color: #6b8080;
      font-weight: 500;
    }
    .msg-input:focus, .msg-textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(10,147,150,.12);
      background: #ffffff;
    }
    .msg-textarea {
      resize: vertical;
      min-height: 250px;
      flex: 1;
    }

    /* Boutons d'action */
    .msg-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }

    .btn-pj {
      background: transparent;
      border: 2px dashed var(--teal);
      color: var(--teal);
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      padding: 12px 24px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .btn-pj:hover {
      background: rgba(10, 147, 150, 0.1);
      transform: translateY(-2px);
    }
    
    .btn-submit {
      background: linear-gradient(135deg, var(--teal), #00b4d8);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 12px 36px;
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(0,0,0,.08);
      transition: transform .2s, box-shadow .2s;
    }
    .btn-submit:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(10,147,150,.3);
    }
    .btn-submit:active {
      transform: translateY(0);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .messagerie-body { flex-direction: column; }
      .messagerie-sidebar { width: 100%; border-right: none; border-bottom: 2px solid rgba(13, 27, 42, 0.08); }
      .messagerie-content { padding: 20px; }
      .msg-actions { flex-direction: column; gap: 15px; align-items: stretch; }
      .btn-submit { width: 100%; }
    }

    /* ── FOOTER ── */
    footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: 42px;
      background: var(--navy);
      display: flex; align-items: center; justify-content: center;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.78rem;
      color: var(--teal-light);
      letter-spacing: 0.08em;
      z-index: 100;
    }
  </style>
</head>
<body>

  <div class="bg-blob blob1"></div>
  <div class="bg-blob blob2"></div>

  <nav>
    <img src="C:/MAMP/htdocs/WEB_2026/logo.jpg" alt="Logo SmartCampus" class="nav-logo-img">
    <span class="nav-brand">SmartCampus</span>
    <div class="nav-links">
      <a href="menu.html">Menu</a>
      <a href="C:/MAMP/htdocs/WEB_2026/dashboard_admin.html">Tableau de bord</a>
      <a href="#" class="active">Profil : Administrateur</a>
      <div class="nav-bell" title="Notifications">🔔</div>
    </div>
  </nav>

  <main class="page-wrapper">
    
    <div class="messagerie-container">
      
      <div class="messagerie-header">
        <h1>messagerie</h1>
      </div>

      <div class="messagerie-body">
        
        <div class="messagerie-sidebar">
          <ul class="sidebar-menu">
            <li class="active">
              Boite réception <span class="badge">non lus</span>
            </li>
            <li>Messages envoyés</li>
            <li>Messages Automatiques</li>
          </ul>
        </div>

        <div class="messagerie-content">
          
          <div class="input-group">
            <input type="text" class="msg-input" placeholder="Destinataire" />
          </div>

          <div class="input-group">
            <input type="text" class="msg-input" placeholder="Objet" />
          </div>

          <div class="input-group" style="flex: 1; display: flex; flex-direction: column;">
            <textarea class="msg-textarea" placeholder="écrivez votre message"></textarea>
          </div>

          <div class="msg-actions">
            <button class="btn-pj">📎 Ajouter PJ</button>
            <button class="btn-submit">Envoyer</button>
          </div>

        </div>

      </div>
    </div>

  </main>

  <footer>© 2026 SmartCampus — Tous droits réservés</footer>

</body>
</html>
